name: Badgr Pipeline Check
description: "CI Failure Diagnosis for GitHub Actions — always-on pipeline check that diagnoses failures, checks health, and scans for security issues. AI escalation optional."
branding:
  icon: activity
  color: blue
runs:
  using: node20
  main: dist/index.js
inputs:
  badgr_api_key:
    required: false
    description: "AI Badgr API key (get at https://aibadgr.com). Optional — rule-based Pipeline Check runs without it. Add to unlock AI-powered diagnosis for unknown failures."
  badgr_api_url:
    required: false
    description: "Custom Badgr API endpoint (e.g., http://badgr-agent-ci.internal:8000/v1 for self-hosted). Defaults to https://aibadgr.com/v1."
    default: "https://aibadgr.com/v1"
  github_token:
    required: true
    description: GitHub token with contents:read, actions:read, pull-requests:write.

trigger:
  - main

pool:
  vmImage: ubuntu-latest

steps:
  - task: NodeTool@0
    inputs:
      versionSpec: '20.x'

  - script: npm ci
    displayName: Install dependencies

  - script: npm test
    displayName: Run tests

  - task: BadgrCI@1
    condition: failed()
    displayName: Badgr Agent CI
    env:
      BADGR_API_KEY: $(BADGR_API_KEY)
      SYSTEM_ACCESSTOKEN: $(System.AccessToken)

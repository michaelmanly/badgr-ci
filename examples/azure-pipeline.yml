trigger:
  - main

pool:
  vmImage: ubuntu-latest

steps:
  - task: NodeTool@0
    inputs:
      versionSpec: '20.x'

  - script: npm ci
    displayName: Install dependencies

  - script: npm test
    displayName: Run tests

  # Badgr Azure Pipelines Failure Check — always run last, condition: always()
  # Diagnoses failures, health, security, and audit using local rules.
  # No BADGR_API_KEY or SYSTEM_ACCESSTOKEN required for rule-based analysis.
  - task: BadgrCI@1
    condition: always()
    displayName: Badgr Pipeline Check
    env:
      BADGR_API_KEY: $(BADGR_API_KEY)
      BADGR_OUTPUT_MODE: summary
      # SYSTEM_ACCESSTOKEN: $(System.AccessToken)  # optional: richer logs + PR thread comments

  # Enhanced — pass SYSTEM_ACCESSTOKEN for real Azure DevOps task logs.
  # - task: BadgrCI@1
  #   condition: always()
  #   displayName: Badgr Pipeline Check (enhanced)
  #   env:
  #     BADGR_API_KEY: $(BADGR_API_KEY)
  #     SYSTEM_ACCESSTOKEN: $(System.AccessToken)
  #     BADGR_OUTPUT_MODE: summary

  # Self-hosted — no logs sent to aibadgr.com.
  # - task: BadgrCI@1
  #   condition: always()
  #   displayName: Badgr Pipeline Check (self-hosted)

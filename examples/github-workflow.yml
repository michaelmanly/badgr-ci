name: CI

on:
  pull_request:

permissions:
  contents: read
  actions: read
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm test

      - name: Badgr Agent CI
        uses: michaelmanly/badgr-ci@v1
        if: failure()
        with:
          badgr_api_key: ${{ secrets.BADGR_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

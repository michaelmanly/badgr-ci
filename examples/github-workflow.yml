name: CI

on:
  pull_request:

permissions:
  contents: read
  actions: read
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm test

      # Badgr GitHub Actions Failure Check — diagnoses failures on every run.
      # No BADGR_API_KEY required for rule-based diagnosis.
      # Add BADGR_API_KEY to unlock AI analysis for unknown failures.
      - name: Badgr Pipeline Check
        uses: michaelmanly/badgr-ci@v1
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          badgr_api_key: ${{ secrets.BADGR_API_KEY }}

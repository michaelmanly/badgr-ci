stages:
  - test

test:
  stage: test
  image: node:20
  script:
    - npm ci
    - npm test

# Badgr GitLab CI Failure Check — diagnoses failures, health, security, and config.
# Download dist/gitlab.js from: https://github.com/michaelmanly/badgr-ci/releases/latest
badgr-pipeline-check:
  stage: .post
  image: node:20
  when: always
  before_script:
    - curl -fsSL https://github.com/michaelmanly/badgr-ci/releases/latest/download/gitlab.js -o /tmp/badgr-gitlab.js
  script:
    - node /tmp/badgr-gitlab.js
  variables:
    BADGR_API_KEY: $BADGR_API_KEY     # remove to use rule-based checks only
    GITLAB_TOKEN: $GITLAB_TOKEN       # optional: richer MR comments
